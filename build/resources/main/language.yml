      join-title: "&e1v1"
      join-subtitle: "&fVocê foi teletransportado!"
    fps:
      join-title: "&eFPS"
      join-subtitle: "&fVocê foi teletransportado!"
    sumo:
      join-title: "&eSumô"
      join-subtitle: "&fVocê foi teletransportado!"
    lava:
      join-title: "&eLava"
      join-subtitle: "&fVocê foi teletransportado!"
