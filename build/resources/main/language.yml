      no-permission: "&cVocê não possui permissão para executar este comando!"
    profile:
      user-not-found: "&b&lPROFILE &8➸ &7Usuário &cnão encontrado&7!"
      no-permission: "&cVocê não possui permissão para executar este comando!"
    rank:
      user-not-found: "&b&lPROFILE &8➸ &7Usuário &cNão encontrado&7!"
      no-permission: "&cVocê não possui permissão para executar este comando!"
    respond:
      no-user-to-respond: "&b&lTELL &8➸ &7Você &cnão possue ninguém para responder&7!"
      no-permission: "&cVocê não possui permissão para executar este comando!"
    scoreboard:
      score-activate: "&b&lSCORE &8➸ &fA ScoreBoard Foi &aATIVADA&f!"
