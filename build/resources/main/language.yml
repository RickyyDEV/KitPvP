      no-permission: "&cVocê não possui permissão para executar este comando!"


  # %time% - Retorna o tempo restante
  # %player% - Retorna o player
  cooldown: "&cVocê Deve esperar %time% para enviar Outra Mensagem!"


  # %player% - Retorna o player
  # %atual-rank% - Retorna o rank antes de upar
  # %pass-rank% - Retorna o rank que o usuário conquistou
  rank-pass: "&b&lRANK &8➸ &7O jogador %player% &7Passou para o rank %pass-rank%"


  # %player% - Retorna o player
  # %value% - Retorna xp/coins ganhos ou perdidos (dependendo da ocasião)
  xp:
    give-xp: "&b&lXP &8➸ &7Você &aganhou &6%value% Coins &7!"
    lose-xp: "&b&lXP &8➸ &7Você &cPerdeu &a%value%XP &7!"
  coins:
    give-coins: "&a&lCOINS &8➸ &7Você &aganhou &a%value%XP &7!"
    lose-coins: "&a&lCOINS &8➸ &7Você &cPerdeu &6%value% Coins &7!"


  warps:
