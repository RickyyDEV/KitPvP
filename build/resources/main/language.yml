#  CASO VOCÊ NÃO TENHA UM SITE DE LOJA PODE COLOCAR O LINK DO SEU SERVIDOR DO DISCORD!
link: "https://discord.gg/AFu86sHXRH"

mensagens:

  commands:
    clear-chat:
      # %player% - Returna o author do clear chat
      final-message: "&b&lCHAT &8➸ &7Chat limpo por &a%player%&7!"
      no-permission: "&cVocê não possui permissão para executar este comando!"
    gm:
      # %game_type% - Retorna o gamemode escolhido pelo usuário
      gamemode-change: "&b&lGAMEMODE &8➸ &7Você Agora está no modo &6%game_type%"
      no-permission: "&cVocê não possui permissão para executar este comando!"
    info:
      no-permission: "&cVocê não possui permissão para executar este comando!"
    inv:
      # %player% - Retorna o author do inventario
      seeing-inventory: "&b&lINVENTORY &8➸ &7Você está vendo o invetário de &a%player%&7!"
