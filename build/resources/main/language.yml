      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - "&aOlá &6%player%! &aSeja bem-vindo ao servidor de KitPvP!"
      - "&r"
      - "&aClique no minecart para escolher as warps que deseja jogar!"
      - "&r"
      - "&aClique na estrela para escolher seu kit!"
      - "&r"
      - "&aClique Na esmeralda para acionar a loja!"


    # Titulo e subtitulo de boas vindas
    # %player% para retornar o player!

    # DEIXE os campos de texto assim -> ""
    # Caso não queira que tenha mensagem de boas vindas
    spawn-title: "&eKitPvP"
    spawn-subtitle: "&aSeja bem-vindo!"



  # Titulo e subtitulo da Entrada Da Arena
  # PLACEHOLDERS
  # %kit% - retorna o kit escolhido pelo usuário
  # %player% para retornar o player!
  arena-title: "&e%kit%"
  arena-subtitle: "&7Você entrou na arena!"


  # Configuracoes da ScoreBoard

  # PLACEHOLDERS
  # %player% - retorna o nome do player
  # %tag% - retorna a tag do usuário
