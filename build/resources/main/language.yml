      no-permission: "&cVocê não possui permissão para executar este comando!"
    fly:
      can-fly: "&b&lFLY &8➸ &6Você&7 agora &aPode Voar&7!"
      canot-fly: "&b&lFLY &8➸ &7&6Você &7agora &cNão Pode Voar&7!"
      mencioned-user-not-found: "&b&lFLY &8➸ &7O usuário mencionado &cnão existe&7!"
      only-lobby: "&b&lFLY &8➸ &7Você &cSó pode voar em lobbys&7!"
      no-permission: "&cVocê não possui permissão para executar este comando!"
    lobby:
      lobby-unset: "&b&lLOBBY &8➸ &7Ocorreu &cum erro ao tentar executar este comando&7, tente novamente mais tarde!"
